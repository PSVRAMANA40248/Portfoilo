<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | P.SAI VENKAT RAMANA</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Fira+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --accent: #605DFF;
    --accent2: #11C0E2;
    --font-main: 'Montserrat', sans-serif;
}

body {
    margin: 0;
    font-family: var(--font-main);
    background: linear-gradient(120deg,#e0eafc,#cfdef3);
}

/* HEADER */
.header {
    position: fixed;
    width: 100%;
    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
    padding: 15px 0;
}

.navbar {
    display: flex;
    justify-content: space-between;
    padding: 0 40px;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 20px;
}

.nav-links a {
    text-decoration: none;
    color: #333;
}

/* HERO */
.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 80px;
}

.hero-inner {
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    align-items: center;
}

/* TEXT */
.hero-text {
    max-width: 450px;
}

.hero-text h1 {
    font-size: 2.5rem;
}

/* ✅ FIXED BUTTONS */
.hero-btns {
    display: flex;
    flex-wrap: wrap;      /* prevents overlap */
    gap: 15px;            /* spacing */
    margin-top: 20px;
}

.btn {
    padding: 12px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    min-width: 150px;
    text-align: center;
}

/* BUTTON COLORS */
.primary-btn {
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    color: white;
}

.secondary-btn {
    border: 2px solid var(--accent);
    color: var(--accent);
}

/* IMAGE */
.profile-card img {
    width: 250px;
    border-radius: 15px;
}

/* MOBILE */
@media(max-width:600px){
    .hero-inner {
        flex-direction: column;
        text-align: center;
    }
}
</style>
</head>

<body>

<header class="header">
<nav class="navbar">
    <h2>My Portfolio</h2>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Skills</a></li>
        <li><a href="#">Projects</a></li>
        <li><a href="#">Contact</a></li>

        <!-- Resume Navbar -->
        <li><a href="./resume.pdf" target="_blank">Resume</a></li>
    </ul>
</nav>
</header>

<section class="hero">
<div class="hero-inner">

<div class="hero-text">
    <h4>Hello and Welcome</h4>
    <h1>P.SAI VENKAT RAMANA</h1>

    <p>
        Passionate about learning and building <b>VLSI circuits</b>.
        I enjoy working on digital design, verification, and IoT.
    </p>

    <!-- ✅ FIXED BUTTONS -->
    <div class="hero-btns">
        <a href="#" class="btn primary-btn">View Portfolio</a>
        <a href="#" class="btn secondary-btn">Contact Me</a>
        <a href="./resume.pdf" target="_blank" class="btn primary-btn">View Resume</a>
        <a href="./resume.pdf" download class="btn secondary-btn">Download Resume</a>
    </div>
</div>

<div class="profile-card">
    <img src="./PSVRAMANA.jpg">
</div>

</div>
</section>

</body>
</html>
